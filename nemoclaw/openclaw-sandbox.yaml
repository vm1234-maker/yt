# NemoClaw custom policy for yt-manager sandbox
# Extends default openclaw policy with Supabase + Next.js access
# Apply via: openshell policy set --policy nemoclaw/openclaw-sandbox.yaml yt-manager --wait

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.openclaw
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.openclaw-data

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # ── Core NemoClaw requirements (from default policy) ──────────────────────
  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/npm }
      - { path: /usr/local/bin/node }

  # pip / venv: PyPI + wheel CDN (proxy returns 403 if endpoints or binary paths don’t match)
  # Binary paths support globs — see OpenShell policy schema (Binary Object).
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/bin/pip3 }
      - { path: /sandbox/.venvs/** }

  # ── YouTube Automation additions ──────────────────────────────────────────
  supabase:
    name: supabase
    endpoints:
      - host: hztnoisuhyxdnjgvcaed.supabase.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/rest/v1/**" }
          - allow: { method: "*", path: "/realtime/v1/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/local/bin/python3 }

  nextjs_api:
    name: nextjs_api
    endpoints:
      - host: host.docker.internal
        port: 3000
        protocol: rest
        enforcement: enforce
        tls: passthrough
        rules:
          - allow: { method: GET,  path: "/api/health" }
          - allow: { method: POST, path: "/api/run-agent" }
          - allow: { method: POST, path: "/api/run-pipeline" }
          - allow: { method: GET,  path: "/api/agents" }
          - allow: { method: GET,  path: "/api/agent-status/**" }
          - allow: { method: POST, path: "/api/content/approve" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/local/bin/python3 }
