services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /app/__pycache__
      - ./sandbox/output:/sandbox/output

  worker:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/app
    command: celery -A tasks worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - ./sandbox/output:/sandbox/output

  beat:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/app
    command: celery -A tasks beat --loglevel=info
    volumes:
      - .:/app
      - ./sandbox/output:/sandbox/output
